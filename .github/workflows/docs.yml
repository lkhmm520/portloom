name: docs
on:
  push:
    branches: [main]
    paths: [docs/**, examples/**, scripts/**, package.json, package-lock.json, Dockerfile.docs, deploy/docs/**, .github/workflows/docs.yml]
  pull_request:
    paths: [docs/**, examples/**, scripts/**, package.json, package-lock.json, Dockerfile.docs, deploy/docs/**, .github/workflows/docs.yml]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Audit complete documentation dependency surface
        run: npm audit
      - name: Build bilingual documentation
        env:
          DOCS_BASE: /
          DOCS_ORIGIN: https://docs.961121.xyz/
        run: npm run docs:build
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && vars.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.ENABLE_GITHUB_PAGES == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
