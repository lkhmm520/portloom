name: test
on:
  push:
  pull_request:
  workflow_call:
permissions:
  contents: read
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go:
    name: Go and Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.25.12', cache: true }
      - run: go mod download
      - name: Verify formatting
        run: make fmt-check
      - name: Vet
        run: make vet
      - name: Test with race detector
        run: make test-race
      - name: Check dependency-free Web assets
        run: make web-check
      - name: Build binaries
        run: make build VERSION="${GITHUB_SHA::12}"

  docs:
    name: Bilingual documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: '22', cache: npm }
      - run: npm ci --ignore-scripts
      - name: Audit complete documentation dependency surface
        run: npm audit
      - name: Build documentation
        env: { DOCS_BASE: /portloom/ }
        run: npm run docs:build

  containers:
    name: Container and Compose checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [go, docs]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Render Compose configurations
        run: |
          cp .env.example .env
          docker compose --env-file .env.example -f deploy/server/docker-compose.yml config --quiet
          docker compose --env-file .env.example -f deploy/agent/docker-compose.yml config --quiet
          docker compose -f deploy/docs/docker-compose.yml config --quiet
          cp examples/server.env.example examples/server.env
          cp examples/agent.env.example examples/agent.env
          cp examples/agent-web.env.example examples/agent-web.env
          cp examples/agent-media.env.example examples/agent-media.env
          docker compose --env-file examples/server.env -f examples/docker-compose.server.yml config --quiet
          docker compose --env-file examples/agent.env -f examples/docker-compose.agent.yml config --quiet
          docker compose -f examples/docker-compose.dual-agent.yml config --quiet
      - name: Verify release workflow contracts
        run: python3 tests/release_workflows_test.py
      - name: Build Server image
        run: docker build --build-arg VERSION="${GITHUB_SHA::12}" --build-arg COMMIT="${GITHUB_SHA}" --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" -f Dockerfile.server -t portloom-server:test .
      - name: Build Agent image
        run: docker build --build-arg VERSION="${GITHUB_SHA::12}" --build-arg COMMIT="${GITHUB_SHA}" --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" -f Dockerfile.agent -t portloom-agent:test .
      - name: Build managed SSH image
        run: docker build -f Dockerfile.sshd -t portloom-sshd:test .
      - name: Check installer contracts
        run: ./tests/installers_test.sh
      - name: Verify managed SSH restrictions and key persistence
        run: ./tests/managed_sshd_image_test.sh
      - name: Verify Server Compose cold start from empty bind mounts
        env:
          PORTLOOM_TEST_SERVER_IMAGE: portloom-server:test
          PORTLOOM_TEST_SSHD_IMAGE: portloom-sshd:test
          PORTLOOM_HOST_WORKSPACE: ${{ github.workspace }}
        run: ./tests/server_compose_cold_start_test.sh
      - name: Verify generated Server and Agent installer Compose end to end
        env:
          PORTLOOM_TEST_SERVER_IMAGE: portloom-server:test
          PORTLOOM_TEST_AGENT_IMAGE: portloom-agent:test
          PORTLOOM_TEST_SSHD_IMAGE: portloom-sshd:test
          PORTLOOM_HOST_WORKSPACE: ${{ github.workspace }}
        run: ./tests/installers_e2e_test.sh
      - name: Verify complete two-host enrollment, tunnel, route, and restart flow
        env:
          PORTLOOM_SERVER_IMAGE: portloom-server:test
          PORTLOOM_AGENT_IMAGE: portloom-agent:test
          PORTLOOM_SSHD_IMAGE: portloom-sshd:test
        run: ./tests/two_host_flow_test.sh
      - name: Build Docs image
        run: docker build -f Dockerfile.docs -t portloom-docs:test .
