name: portloom-server
services:
  server:
    image: ${PORTLOOM_SERVER_IMAGE:-ghcr.io/lkhmm520/portloom-server:latest}
    container_name: portloom-server
    restart: unless-stopped
    network_mode: host
    env_file: [server.env]
    environment:
      TM_LISTEN_ADDR: ${TM_LISTEN_ADDR:-127.0.0.1:8080}
      TM_GATEWAY_ADDR: ${TM_GATEWAY_ADDR:-127.0.0.1:8081}
      TM_DATABASE_PATH: /data/portloom.db
      TM_WEB_DIR: /app/web
      TM_ADMIN_TOKEN: ${TM_ADMIN_TOKEN:?set TM_ADMIN_TOKEN in server.env}
    volumes:
      - ${TM_SERVER_DATA_DIR:-./data/server}:/data
    read_only: true
    tmpfs: [/tmp:size=16m,mode=1777]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
